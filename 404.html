<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>404 — Page Not Found</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; color: #1c1917; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; -webkit-font-smoothing: antialiased; }
    .code { font-size: 6rem; font-weight: 700; letter-spacing: -.05em; color: #e7e5e0; line-height: 1; margin-bottom: .5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
    p { color: #78716c; margin-bottom: 1.75rem; }
    a { display: inline-block; background: #2563eb; color: #fff; padding: .6rem 1.5rem; border-radius: 7px; font-weight: 600; text-decoration: none; transition: background .15s; }
    a:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/base64-image-converter/">Go to Homepage</a>
</body>
</html>
